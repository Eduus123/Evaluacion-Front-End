<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>

  <header class="navbar navbar-dark sticky-top bg-dark flex-md-nowrap p-0 shadow">
    <a class="navbar-brand col-md-3 col-lg-2 me-0 px-3" href="#">Panel de Control</a>
  </header>

  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse">
        <div class="position-sticky pt-3">
          <ul class="nav flex-column">
            <li class="nav-item">
              <a class="nav-link active" href="#">
                Inicio
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="sign-in.html">
                Cerrar sesión
              </a>
            </li>
          </ul>
        </div>
      </nav>

      <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
          <h1 class="h2">Dashboard</h1>
        </div>

        <div class="text-center my-5">
          <button id="btnPresioname" type="button" class="btn btn-primary btn-lg">
            Presióname <span id="contador">15</span> veces mas
          </button>
        </div>

        <div class="d-flex justify-content-center">
          <div class="card text-white bg-primary" id="miCard" style="width: 22rem;">
            <div class="card-header" id="cardHeader">Estado del sistema</div>
            <img src="img/estado-normal.png" class="card-img-top" id="cardImg" alt="Estado">
            <div class="card-body">
              <h5 class="card-title" id="cardTitulo">Estado óptimo</h5>
              <p class="card-text" id="cardDescripcion">Todo funciona con normalidad.</p>
            </div>
            <div class="card-footer" id="cardFooter">15</div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
