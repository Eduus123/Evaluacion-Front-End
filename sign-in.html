<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body class="text-center">

  <main class="form-signin w-100 m-auto">
    <form>
      <img class="mb-4" id="logo" src="img/logo.png" alt="" width="72" height="72">
      <h1 class="h3 mb-3 fw-normal">Inicia sesión</h1>

      <div id="alertContainer"></div>

      <div class="form-floating">
        <input type="text" class="form-control" id="inputUsername" placeholder="Usuario">
        <label for="inputUsername">Usuario</label>
      </div>
      <div class="form-floating">
        <input type="password" class="form-control" id="inputPassword" placeholder="Contraseña">
        <label for="inputPassword">Contraseña</label>
      </div>

      <button class="w-100 btn btn-lg btn-primary mt-3" type="button" id="btnLogin">Ingresar</button>
      <p class="mt-5 mb-3 text-muted">&copy; 2026 - Evaluación Sumativa N°02</p>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
